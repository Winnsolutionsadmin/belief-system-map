<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Jarred Winn - Belief System Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Inter',-apple-system,sans-serif;overflow-x:hidden}
.header{padding:20px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.08)}
.header h1{font-size:22px;font-weight:700}
.header p{font-size:12px;color:#666;margin-top:4px}
.stats{display:flex;justify-content:center;gap:16px;margin-top:10px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,0.05);border-radius:6px;padding:6px 12px;font-size:12px}
.stat span{font-weight:700;color:#fff}
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:10px 20px;justify-content:center;border-bottom:1px solid rgba(255,255,255,0.05)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#888}
.legend-dot{width:8px;height:8px;border-radius:50%}
.network-wrap{width:100%;overflow:auto;-webkit-overflow-scrolling:touch;position:relative}
.network-wrap svg{display:block;min-width:1000px}
.idea-node:hover circle{opacity:1;r:24}
.idea-node:hover text{opacity:1}

/* Detail panel */
#panel{display:none;position:fixed;bottom:0;left:0;right:0;max-height:70vh;background:rgba(12,12,20,0.98);
  border-top:2px solid rgba(99,102,241,0.4);backdrop-filter:blur(16px);overflow-y:auto;
  z-index:200;padding:20px 24px 30px;transition:transform 0.3s ease;animation:slideUp 0.25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#panel.show{display:block}
#panel-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#888;font-size:24px;cursor:pointer;padding:4px 8px}
#panel-close:hover{color:#fff}
.panel-title{font-size:18px;font-weight:700;margin-bottom:2px;padding-right:40px}
.panel-meta{font-size:11px;color:#666;margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap}
.panel-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;text-transform:uppercase}
.badge-sim{background:rgba(99,102,241,0.2);color:#a5b4fc}
.badge-con{background:rgba(245,158,11,0.2);color:#fcd34d}
.badge-ai{background:rgba(239,68,68,0.15);color:#fca5a5}
.badge-auth{background:rgba(16,185,129,0.2);color:#6ee7b7}
.badge-crypto{background:rgba(59,130,246,0.2);color:#93c5fd}
.badge-orig{background:rgba(168,85,247,0.2);color:#c084fc}
.panel-section{margin-top:14px}
.panel-section h3{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.panel-theory{font-size:14px;line-height:1.6;color:#ccc}
.panel-thinkers{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.t-tag{font-size:11px;padding:3px 8px;border-radius:4px;display:inline-block}
.t-ally{background:rgba(74,222,128,0.12);color:#86efac;border:1px solid rgba(74,222,128,0.2)}
.t-adv{background:rgba(248,113,113,0.12);color:#fca5a5;border:1px solid rgba(248,113,113,0.2)}
.t-rel{background:rgba(147,197,253,0.1);color:#93c5fd;border:1px solid rgba(147,197,253,0.15)}
.panel-link{display:inline-block;margin-top:12px;color:#6366f1;font-size:12px;text-decoration:none;border:1px solid rgba(99,102,241,0.3);padding:6px 14px;border-radius:6px}
.panel-link:hover{background:rgba(99,102,241,0.1)}
.panel-quote{font-style:italic;color:#999;border-left:3px solid rgba(99,102,241,0.3);padding:8px 12px;margin-top:8px;font-size:13px}
.footer{padding:16px;text-align:center;color:#333;font-size:10px}
</style>
</head>

function showPanel(id) {
  const d = data[id];
  if (!d) return;
  const panel = document.getElementById('panel');
  const inner = document.getElementById('panel-inner');
  
  const domainClass = domainBadgeClass[d.domain] || 'auth';
  const badgeText = badges[id] || '';
  
  let html = '<div class="panel-title">#' + id + ': ' + d.title + '</div>';
  html += '<div class="panel-meta">';
  html += '<span class="panel-badge badge-' + domainClass + '">' + d.domain + '</span>';
  if (d.confidence) html += '<span class="panel-badge badge-' + domainClass + '">Confidence: ' + d.confidence + '</span>';
  if (badgeText) html += '<span class="panel-badge badge-orig">' + badgeText + '</span>';
  html += '</div>';
  
  if (d.theory) {
    html += '<div class="panel-section"><h3>Theory</h3><div class="panel-theory">' + d.theory + '</div></div>';
  }
  
  if (d.quotes && d.quotes.length > 0) {
    html += '<div class="panel-section"><h3>Key Quotes</h3>';
    d.quotes.forEach(function(q) { html += '<div class="panel-quote">' + q + '</div>'; });
    html += '</div>';
  }
  
  const hasT = (d.allies && d.allies.length) || (d.adversaries && d.adversaries.length) || (d.related && d.related.length);
  if (hasT) {
    html += '<div class="panel-section"><h3>Connected Thinkers</h3><div class="panel-thinkers">';
    if (d.allies) d.allies.forEach(function(n) { html += '<span class="t-tag t-ally">🤝 ' + n + '</span>'; });
    if (d.adversaries) d.adversaries.forEach(function(n) { html += '<span class="t-tag t-adv">⚔️ ' + n + '</span>'; });
    if (d.related) d.related.forEach(function(n) { html += '<span class="t-tag t-rel">🔗 ' + n + '</span>'; });
    html += '</div></div>';
  }
  
  if (d.url) html += '<a href="' + d.url + '" target="_blank" class="panel-link">Open in Notion →</a>';
  
  inner.innerHTML = html;
  panel.classList.add('show');
}

function hidePanel() {
  document.getElementById('panel').classList.remove('show');
}

// Close on background tap
document.querySelector('.network-wrap').addEventListener('click', function(e) {
